<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Luck Rahman Enterprise | Reset Password</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f4f7fb;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f2937;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
            padding: 32px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.8rem;
        }

        p {
            margin: 0 0 24px;
            color: #4b5563;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        .message {
            margin-top: 16px;
            font-size: 0.95rem;
        }

        .error {
            color: #b91c1c;
        }

        .success {
            color: #15803d;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Good Luck Rahman Enterprise</h1>
        <p>Enter your new password below to finish resetting your account.</p>

        <input id="password" type="password" placeholder="New password" autocomplete="new-password" />
        <button id="submit">Reset password</button>

        <div class="message" id="message"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "REDACTED (Firebase API Key)",
            authDomain: "REDACTED (Firebase Domain)",
            projectId: "my-desktop-app-4ee05",
            storageBucket: "my-desktop-app-4ee05.appspot.com",
            messagingSenderId: "REDACTED (Firebase Sender ID)",
            appId: "1:REDACTED (Firebase Sender ID):web:1a0880f8952f9b11a7654e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const params = new URLSearchParams(window.location.search);
        const oobCode = params.get('oobCode');
        const mode = params.get('mode');
        const messageEl = document.getElementById('message');
        const submitButton = document.getElementById('submit');

        if (!oobCode || mode !== 'resetPassword') {
            messageEl.textContent = 'This reset link is invalid or expired.';
            messageEl.className = 'message error';
            submitButton.disabled = true;
        }

        submitButton.addEventListener('click', async () => {
            const newPassword = document.getElementById('password').value.trim();
            if (!newPassword || newPassword.length < 6) {
                messageEl.textContent = 'Please enter a password of at least 6 characters.';
                messageEl.className = 'message error';
                return;
            }

            try {
                await auth.confirmPasswordReset(oobCode, newPassword);
                messageEl.textContent = 'Password reset successful. You can now sign in.';
                messageEl.className = 'message success';
                submitButton.disabled = true;
            } catch (error) {
                messageEl.textContent = error.message || 'Unable to reset password.';
                messageEl.className = 'message error';
            }
        });
    </script>
</body>

</html>
