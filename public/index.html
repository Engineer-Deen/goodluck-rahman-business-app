<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="Good Luck Rahman Enterprise - Password Reset">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GLRE">
  <meta name="msapplication-TileColor" content="#0f172a">
  <meta name="format-detection" content="telephone=no">
  <title>Good Luck Rahman Enterprise</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f5f7fb;
      color: #1e293b;
      min-height: 100vh;
      padding: 1rem;
    }
    
    .container {
      max-width: 580px;
      margin: 2rem auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      padding: 2rem;
    }
    
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.5rem, 5vw, 2rem);
      color: #0f172a;
    }
    
    p {
      line-height: 1.6;
      margin: 1rem 0;
      font-size: 1rem;
    }
    
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.4rem;
      border-radius: 999px;
      background: #1d4ed8;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      min-height: 44px;
      touch-action: manipulation;
      transition: background 0.2s ease, transform 0.15s ease;
      width: 100%;
      max-width: 300px;
    }
    
    .button:active { transform: scale(0.98); }
    .button:hover { background: #1e40af; }
    
    .button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    
    .button.secondary:hover { background: #cbd5e1; }
    
    .note {
      margin-top: 1.5rem;
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    
    .alert {
      padding: 1rem 1.2rem;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #0f172a;
      margin-top: 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    
    /* Mobile responsiveness */
    @media (max-width: 480px) {
      body { padding: 0.75rem; }
      
      .container {
        margin: 1.5rem auto;
        padding: 1.5rem;
        border-radius: 12px;
      }
      
      h1 { font-size: 1.5rem; margin-bottom: 1rem; }
      p { font-size: 0.95rem; margin: 0.75rem 0; }
      
      .button {
        padding: 0.85rem 1.25rem;
        font-size: 0.95rem;
        width: 100%;
        max-width: 100%;
      }
      
      .alert { padding: 0.85rem 1rem; font-size: 0.9rem; }
      .note { font-size: 0.9rem; margin-top: 1rem; }
    }
    
    @media (max-width: 360px) {
      .container { padding: 1.25rem; }
      h1 { font-size: 1.25rem; }
      p { font-size: 0.9rem; }
      .button { padding: 0.75rem 1rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Good Luck Rahman Enterprise</h1>
    <div id="content">
      <p>Firebase hosting is configured for password reset support.</p>
    </div>
  </div>
  <script>
    function redirectToApp() {
      const timeout = setTimeout(() => {
        window.location.href = 'goodluckrahman://open';
      }, 1000);
      return timeout;
    }

    function renderMessage() {
      const params = new URLSearchParams(window.location.search);
      const mode = params.get('mode');
      const content = document.getElementById('content');
      if (!content) return;
      if (mode === 'resetPassword') {
        content.innerHTML = `
          <p>Your password reset was completed successfully.</p>
          <div class="alert">You will be redirected back to the desktop app shortly.</div>
          <a class="button" href="goodluckrahman://open">Open desktop app now</a>
          <p class="note">If the app does not open automatically, please open Good Luck Rahman Enterprise manually.</p>
        `;
        redirectToApp();
        return;
      }
      content.innerHTML = `
        <p>Welcome to Good Luck Rahman Enterprise.</p>
        <p>This page is used by Firebase password reset after the reset link is completed.</p>
        <div class="alert">If you just completed a password reset, please use the button below to open the desktop app.</div>
        <a class="button" href="goodluckrahman://open">Open desktop app now</a>
        <p class="note">If the app does not open automatically, open the desktop app manually.</p>
      `;
    }
    renderMessage();
  </script>
</body>
</html>
